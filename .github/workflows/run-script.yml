name: Run Python Script Regular

on:
  schedule:
    # 毎日午前11時（日本時間）に実行する設定 (UTCでは午前0時)
    - cron: '0 2 * * *'
  # 手動でも実行できるようにする設定（テスト用に便利）
  workflow_dispatch:

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードをチェックアウト
    - name: Checkout code
      uses: actions/checkout@v5

    # 2. Python環境のセットアップ
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10' # 使用したいバージョン

    # 3. 必要なライブラリ（requestsなど）があればインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. 自作Pythonスクリプトの実行
    - name: Run script
      run: python main.py

    # 5. 生成された log.txt をリポジトリに自動コミットしてプッシュする
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add log.txt
        git commit -m "Update log.txt by GitHub Actions [skip ci]" || echo "No changes to commit"
        git push
